name: Android CI/CD

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  detekt:
    runs-on: ubuntu-latest
    name: Detekt Static Analysis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Crear local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}" >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - run: chmod +x gradlew

      - run: ./gradlew detekt --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Analysis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Crear local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}" >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - run: chmod +x gradlew

      - run: ./gradlew lint --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 30

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests & Coverage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Crear local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}" >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestDebugUnitTestReport --no-daemon
        if: always()

      - name: Verify coverage threshold
        run: ./gradlew verifyCoverage --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/jacoco/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: app/build/reports/jacoco/jacocoTestDebugUnitTestReport/jacocoTestDebugUnitTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          fail_ci_if_error: false

  instrumented-tests:
    runs-on: ubuntu-latest
    name: Instrumented Tests (API ${{ matrix.api-level }})
    needs: [ unit-tests ]
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 26, 29, 33 ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Crear local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}" >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - run: chmod +x gradlew

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/
          retention-days: 30

  build-debug:
    runs-on: ubuntu-latest
    name: Build Debug APK
    needs: [ lint, unit-tests, detekt ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Crear local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}" >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - run: chmod +x gradlew

      - run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  build-release:
    runs-on: ubuntu-latest
    name: Build & Sign Release APK
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ lint, unit-tests ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Crear local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}" >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Restaurar keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - run: chmod +x gradlew

      - name: Compilar APK release firmado
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.RELEASE_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.RELEASE_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.RELEASE_KEY_PASSWORD }}' \
            --no-daemon

      - run: rm -f release.keystore
        if: always()

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.joseibarra.touristnotify
          releaseFiles: app/build/outputs/apk/release/app-release.apk
          track: internal
          status: completed
        continue-on-error: true
